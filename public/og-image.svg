  <path d="M560 190H392c-42 0-42 74-84 74H184M640 190h164c42 0 42 74 84 74h128M560 440H410c-44 0-44-74-88-74H184M640 440h150c44 0 44-74 88-74h138M600 150v330" fill="none" stroke="url(#line)" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
  <g fill="#061936" stroke="#69e6ff" stroke-opacity="0.48">
    <rect x="500" y="226" width="200" height="178" rx="8" />
    <rect x="104" y="222" width="210" height="116" rx="8" />
    <rect x="886" y="222" width="210" height="116" rx="8" />
    <rect x="104" y="354" width="210" height="116" rx="8" />
    <rect x="886" y="354" width="210" height="116" rx="8" />
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#fff">
    <text x="88" y="116" font-size="28" font-weight="800" letter-spacing="2">ALFARANK</text>
    <text x="88" y="186" font-size="62" font-weight="900">Digital systems</text>
    <text x="88" y="250" font-size="62" font-weight="900" fill="#69e6ff">connected and built</text>
    <text x="88" y="304" font-size="62" font-weight="900">to perform.</text>
    <text x="536" y="306" font-size="24" font-weight="900" text-anchor="middle" transform="translate(64 0)">SYSTEM CORE</text>
    <text x="600" y="340" font-size="18" fill="#c7f4ff" text-anchor="middle">Automate. Integrate. Measure.</text>
    <text x="140" y="270" font-size="20" font-weight="800">AI Automation</text>
    <text x="924" y="270" font-size="20" font-weight="800">Web Platforms</text>
    <text x="140" y="402" font-size="20" font-weight="800">Data Systems</text>
    <text x="924" y="402" font-size="20" font-weight="800">Content Ops</text>
    <text x="88" y="560" font-size="24" fill="#c7f4ff">Web platforms, automation, content infrastructure, data workflows, and integrations.</text>
