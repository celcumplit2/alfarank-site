<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="864" viewBox="0 0 1536 864" role="img" aria-labelledby="title desc">
  <title id="title">RoboAgent coaching workflow infographic</title>
  <desc id="desc">Editorial infographic showing RoboAgent coaching workflow, one exclusive coaching provider, five content delivery types, operational signals, and execution risk.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071527"/>
      <stop offset="0.45" stop-color="#09233d"/>
      <stop offset="1" stop-color="#020813"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102f4c" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#061422" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#78f7ff"/>
      <stop offset="1" stop-color="#22c9d6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd36f"/>
      <stop offset="1" stop-color="#ff8f3d"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.21 0 0 0 0 0.88 0 0 0 0 1 0 0 0 0.34 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#00050d" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#65dfff" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 11 6 1 11Z" fill="#62e7f2"/>
    </marker>
  </defs>

  <rect width="1536" height="864" fill="url(#bg)"/>
  <rect width="1536" height="864" fill="url(#grid)"/>
  <path d="M-120 782C210 654 455 656 698 702c269 51 519 43 958-98v260H-120Z" fill="#3abde8" opacity="0.08"/>
  <path d="M1032-72c109 132 230 230 393 286 75 26 140 41 198 53" fill="none" stroke="#78f7ff" stroke-opacity="0.13" stroke-width="2"/>
  <circle cx="1206" cy="166" r="310" fill="#1b86bf" opacity="0.08"/>
  <circle cx="318" cy="703" r="220" fill="#23d1c4" opacity="0.06"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="86" y="91" fill="#8df6ff" font-size="20" font-weight="800" letter-spacing="4">OPERATOR PLAYBOOK</text>
    <text x="86" y="144" fill="#ffffff" font-size="54" font-weight="900">RoboAgent Coaching Workflow</text>
    <text x="88" y="184" fill="#c9e8f4" font-size="24" font-weight="600">Exclusive content layer for real estate agent operations</text>

    <g filter="url(#shadow)">
      <rect x="86" y="238" width="284" height="240" rx="8" fill="url(#panel)" stroke="#4be5ef" stroke-opacity="0.35"/>
      <text x="126" y="316" fill="url(#cyan)" font-size="106" font-weight="900">1</text>
      <text x="126" y="359" fill="#ffffff" font-size="31" font-weight="850">Exclusive</text>
      <text x="126" y="395" fill="#ffffff" font-size="31" font-weight="850">coaching</text>
      <text x="126" y="431" fill="#ffffff" font-size="31" font-weight="850">provider</text>

      <rect x="86" y="506" width="284" height="276" rx="8" fill="url(#panel)" stroke="#4be5ef" stroke-opacity="0.35"/>
      <text x="126" y="594" fill="url(#cyan)" font-size="106" font-weight="900">5</text>
      <text x="126" y="637" fill="#ffffff" font-size="30" font-weight="850">Content</text>
      <text x="126" y="673" fill="#ffffff" font-size="30" font-weight="850">delivery types</text>
      <text x="128" y="715" fill="#d9edf5" font-size="23" font-weight="650">Coaching • Training</text>
      <text x="128" y="746" fill="#d9edf5" font-size="23" font-weight="650">Workflows • Scripts • Video</text>
    </g>

    <g filter="url(#shadow)">
