      <text x="466" y="295" fill="#d7f8ff" font-size="25" font-weight="800">Workflow map</text>

      <rect x="610" y="348" width="214" height="72" rx="10" fill="#0c263e" stroke="#68effa" stroke-width="2"/>
      <text x="656" y="394" fill="#ffffff" font-size="28" font-weight="850">RoboAgent</text>

      <rect x="510" y="500" width="160" height="74" rx="8" fill="#0c263e" stroke="#55dce8" stroke-opacity="0.75"/>
      <text x="552" y="548" fill="#ffffff" font-size="28" font-weight="800">CRM</text>

      <rect x="762" y="500" width="166" height="74" rx="8" fill="#0c263e" stroke="#55dce8" stroke-opacity="0.75"/>
      <text x="808" y="548" fill="#ffffff" font-size="28" font-weight="800">MLS</text>

      <rect x="578" y="640" width="280" height="78" rx="10" fill="#102f4c" stroke="#ffd36f" stroke-width="2"/>
      <text x="620" y="689" fill="#ffffff" font-size="29" font-weight="850">Coaching layer</text>

      <path d="M717 420v58" stroke="#62e7f2" stroke-width="3" marker-end="url(#arrow)"/>
      <path d="M670 537h69" stroke="#62e7f2" stroke-width="3" marker-end="url(#arrow)"/>
      <path d="M717 574v48" stroke="#62e7f2" stroke-width="3" marker-end="url(#arrow)"/>
      <path d="M846 574c0 44-28 56-68 62" fill="none" stroke="#62e7f2" stroke-opacity="0.72" stroke-width="3" marker-end="url(#arrow)"/>
      <path d="M590 574c0 38 31 52 72 61" fill="none" stroke="#62e7f2" stroke-opacity="0.72" stroke-width="3" marker-end="url(#arrow)"/>

      <g filter="url(#softGlow)">
        <circle cx="718" cy="461" r="5" fill="#7df9ff"/>
        <circle cx="738" cy="537" r="5" fill="#7df9ff"/>
        <circle cx="718" cy="616" r="5" fill="#ffd36f"/>
      </g>
    </g>

    <g filter="url(#shadow)">
      <rect x="1050" y="238" width="400" height="246" rx="10" fill="url(#panel)" stroke="#4be5ef" stroke-opacity="0.26"/>
      <text x="1092" y="296" fill="#ffffff" font-size="30" font-weight="850">Operator signals</text>
      <circle cx="1096" cy="350" r="6" fill="#78f7ff"/>
      <text x="1120" y="359" fill="#d9edf5" font-size="25" font-weight="650">Agent adoption</text>
      <circle cx="1096" cy="404" r="6" fill="#78f7ff"/>
      <text x="1120" y="413" fill="#d9edf5" font-size="25" font-weight="650">Productivity change</text>
      <circle cx="1096" cy="458" r="6" fill="#78f7ff"/>
      <text x="1120" y="467" fill="#d9edf5" font-size="25" font-weight="650">Integration readiness</text>

      <rect x="1050" y="512" width="400" height="270" rx="10" fill="#120d12" fill-opacity="0.86" stroke="#ff8f3d" stroke-opacity="0.52"/>
      <text x="1092" y="570" fill="url(#gold)" font-size="32" font-weight="900">Execution risk</text>
      <text x="1092" y="624" fill="#ffffff" font-size="26" font-weight="650">Content depth</text>
      <text x="1092" y="668" fill="#ffffff" font-size="26" font-weight="650">Measured outcomes</text>
      <text x="1092" y="712" fill="#ffffff" font-size="26" font-weight="650">Team adoption discipline</text>
      <path d="M1092 746h246" fill="none" stroke="url(#gold)" stroke-width="7" stroke-linecap="round"/>
      <path d="M1366 746l-42-22v44Z" fill="#ffad52"/>
    </g>
  </g>
</svg>
